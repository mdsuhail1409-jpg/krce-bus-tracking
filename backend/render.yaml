# ─────────────────────────────────────────────────────────────────
# Render Blueprint — KRCE Bus Tracking System
# One-click deployment configuration for Render.com
# ─────────────────────────────────────────────────────────────────

services:
  - type: web
    name: krce-bus-tracking
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: MONGO_URI
        sync: false  # Set manually in Render dashboard
      - key: MONGO_DB_NAME
        value: krce_bus
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
