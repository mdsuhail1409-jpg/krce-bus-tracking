# ─────────────────────────────────────────────────────────────────
# KRCE Bus Tracking — Android Build Properties
#
# PRODUCTION: Points directly to the Railway backend.
# Replace "your-railway-app.up.railway.app" with your actual Railway project URL.
#
# LOCAL DEV: Override in local.properties (gitignored):
#   API_BASE_URL=http://10.0.2.2:8000/
#   WS_BASE_URL=ws://10.0.2.2:8000/
# ─────────────────────────────────────────────────────────────────

# Production — Direct Railway connection (Vercel proxy removed for WebSocket compatibility)
API_BASE_URL=https://krce-bus-tracking.onrender.com/
WS_BASE_URL=wss://krce-bus-tracking.onrender.com/

# Android build defaults
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
