name: Flutter Build & APK Release Management

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: |
          cd frontend/krce_bus_flutter
          flutter pub get

      - name: Build Flutter Release APK
        run: |
          cd frontend/krce_bus_flutter
          flutter build apk --release

      - name: Verify APK Build Output
        run: |
          if [ ! -f "frontend/krce_bus_flutter/build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "Error: APK compilation failed. Output binary not found."
            exit 1
          fi

      - name: Upload APK as GitHub Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release-apk
          path: frontend/krce_bus_flutter/build/app/outputs/flutter-apk/app-release.apk

      - name: Process Release and Version Archives
        id: versioning
        run: |
          # Extract version from pubspec.yaml
          RAW_VERSION=$(grep 'version: ' frontend/krce_bus_flutter/pubspec.yaml | sed 's/version: //g' | cut -d'+' -f1 | xargs)
          VERSION="v$RAW_VERSION"
          echo "Determined version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Create directories if not exists
          mkdir -p android-builds/latest
          mkdir -p android-builds/archive/$VERSION
          mkdir -p android-builds/release-notes

          # Retrieve active build from builds folder
          APK_SOURCE="frontend/krce_bus_flutter/build/app/outputs/flutter-apk/app-release.apk"

          # Copy APK to latest
          cp "$APK_SOURCE" android-builds/latest/app-release.apk

          # Copy APK to archive
          cp "$APK_SOURCE" android-builds/archive/$VERSION/app-release.apk

          # Generate release notes from template if not exists
          NOTE_FILE="android-builds/release-notes/$VERSION.md"
          if [ ! -f "$NOTE_FILE" ]; then
            cp android-builds/release-notes/template.md "$NOTE_FILE"
            # Replace placeholder versions & dates
            sed -i "s/v\[X.Y.Z\]/$VERSION/g" "$NOTE_FILE"
            sed -i "s/\[YYYY-MM-DD\]/$(date +%Y-%m-%d)/g" "$NOTE_FILE"
          fi

      - name: Commit Build Artifacts back to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-builds/
          git commit -m "Update APK releases & archives to ${{ steps.versioning.outputs.version }} [skip ci]" || echo "No changes to commit"
          git push origin main || echo "Failed to push build artifacts"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: android-builds/release-notes/${{ github.ref_name }}.md
          files: |
            frontend/krce_bus_flutter/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
